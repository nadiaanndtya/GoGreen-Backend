services:
  backend:
    build: .
    container_name: backend-app
    ports:
      - "5000:5000"
    depends_on:
      - mysql
    restart: always
    env_file:
      - .env

  mysql:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bismillah
    ports:
      - "3307:3306"
      